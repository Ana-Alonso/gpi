# ==========================================
# CONFIGURACIÓN DE TEST (H2 IN-MEMORY)
# ==========================================
# Esta configuración aísla los tests del entorno real.
# Se activa automáticamente al ejecutar 'mvn test'.

# 1. Base de datos en memoria (H2)
# DB_CLOSE_DELAY=-1 es crucial para que la BD no se resetee entre tests de una misma clase
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 2. Configuración JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 3. Seguridad Mock
# Usamos una URL de issuer válida (Google) para que el validador JWT de arranque no falle,
# aunque durante los tests unitarios no se hará una conexión real.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com
