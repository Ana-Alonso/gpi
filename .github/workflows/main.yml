name: Quality Gate POC
on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./resource-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build, Test & Lint
        run: mvn clean verify -B

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-backend
          path: resource-server/target/site/jacoco/
          
      - name: Upload SBOM Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend-json
          # Ruta exacta según tu log de Maven
          path: resource-server/target/classes/META-INF/sbom/application.cdx.json
            
      - name: Snyk Backend Scan
        run: |
            npm install -g snyk
            snyk test --file=pom.xml
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ag-prueba-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ag-prueba-front/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Linting (Static Code Analysis)
        run: npm run lint

      - name: Security Audit (SCA)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Verify Build
        run: npm run build -- --configuration development  

      - name: Snyk Frontend Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ag-prueba-front/package.json
