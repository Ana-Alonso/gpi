name: Quality Gate POC
on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./resource-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test & Lint
        # AQUÍ ESTÁ EL TRUCO: Pasamos la configuración de H2 y el Issuer "fake" por línea de comandos.
        # Esto anula la configuración de tu application.properties que busca MySQL.
        run: >
          mvn clean verify -B
          -Dspring.datasource.url="jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"
          -Dspring.datasource.driver-class-name="org.h2.Driver"
          -Dspring.datasource.username="sa"
          -Dspring.datasource.password="password"
          -Dspring.jpa.database-platform="org.hibernate.dialect.H2Dialect"
          -Dspring.jpa.hibernate.ddl-auto="create-drop"
          -Dspring.security.oauth2.resourceserver.jwt.issuer-uri="https://accounts.google.com"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-backend
          path: resource-server/target/site/jacoco/

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ag-prueba-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ag-prueba-front/package-lock.json

      - name: Install & Verify
        run: |
          npm ci
          # Como no tienes linter configurado, probamos solo la compilación:
          npm run build -- --configuration development
