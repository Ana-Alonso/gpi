name: Quality Gate POC
on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        # CORRECCIÓN 1: Apuntamos a la carpeta correcta del backend
        working-directory: ./resource-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test & Lint
        # Esto ejecutará el pom.xml que está dentro de resource-server
        run: mvn clean verify -B

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-backend
          # CORRECCIÓN 2: La ruta del reporte también cambia
          path: resource-server/target/site/jacoco/

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        # CORRECCIÓN 3: Tu frontend se llama 'ag-prueba-front', no 'frontend'
        working-directory: ./ag-prueba-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          # CORRECCIÓN 4: Ruta exacta al lockfile para el caché
          cache-dependency-path: ag-prueba-front/package-lock.json

      - name: Install & Lint
        run: |
          npm ci
          npm run lint
          # Si tienes prettier configurado, descomenta la siguiente línea:
          # npx prettier --check .
