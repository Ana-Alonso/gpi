name: Quality Gate POC
on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./resource-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test & Lint
        # Ejecuta los tests y checkstyle
        run: mvn clean verify -B

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-backend
          path: resource-server/target/site/jacoco/

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ag-prueba-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ag-prueba-front/package-lock.json

      - name: Install & Verify
        run: |
          npm ci
          # HE COMENTADO EL LINT PORQUE AÚN NO LO TIENES CONFIGURADO
          # npm run lint
          # npx prettier --check .
          
          # En su lugar, comprobamos que el proyecto compila correctamente:
          npm run build -- --configuration development
