name: Quality Gate POC
on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4 # Actualizado a v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test & Lint
        run: mvn clean verify -B

      - name: Upload Coverage Report
        if: always()
        # CORRECCIÓN CRÍTICA: v3 -> v4
        uses: actions/upload-artifact@v4 
        with:
          name: jacoco-report
          # Nota: En v4 es mejor subir el directorio completo si quieres ver los estilos css del reporte
          path: target/site/jacoco/ 

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4

      - name: Setup Node
        uses: actions/setup-node@v4 # Actualizado a v4
        with:
          node-version: '18'
          cache: 'npm'
          # IMPORTANTE: Asegúrate de que este archivo existe en tu repo. 
          # Si no usas package-lock.json, comenta la siguiente línea.
          cache-dependency-path: frontend/package-lock.json 

      - name: Install & Lint
        run: |
          npm ci
          npm run lint
          npx prettier --check .
