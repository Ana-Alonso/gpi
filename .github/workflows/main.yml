name: Quality Gate POC
on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./resource-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test & Lint
        # Ejecuta verify, que dispara checkstyle y ahora también el quality gate de jacoco
        run: mvn clean verify -B

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-backend
          path: resource-server/target/site/jacoco/

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ag-prueba-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ag-prueba-front/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit (SCA)
        # Esto valida el OKR de seguridad. 
        # Si quieres que falle solo con vulnerabilidades críticas:
        run: npm audit --audit-level=critical
        # Si prefieres que NO bloquee el pipeline aunque encuentre fallos (solo informar):
        # run: npm audit || true

      - name: Verify Build
        run: npm run build -- --configuration development
