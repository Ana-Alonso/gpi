name: Quality Gate POC
on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./resource-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test & Lint
        # SOLUCIÓN: Usamos variables de entorno para configurar la BD en memoria (H2).
        # Esto evita errores de comillas y asegura que Spring Boot coja la configuración.
        env:
          SPRING_DATASOURCE_URL: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.h2.Driver"
          SPRING_DATASOURCE_USERNAME: "sa"
          SPRING_DATASOURCE_PASSWORD: "password"
          SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.H2Dialect"
          SPRING_JPA_HIBERNATE_DDL_AUTO: "create-drop"
          # Usamos Google como issuer para que no falle intentando conectar a localhost:9000
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "https://accounts.google.com"
        run: mvn clean verify -B

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-backend
          path: resource-server/target/site/jacoco/

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ag-prueba-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ag-prueba-front/package-lock.json

      - name: Install & Verify
        run: |
          npm ci
          # Como no tienes el script 'lint' configurado en package.json, lo comentamos
          # npm run lint
          
          # En su lugar, verificamos que el proyecto compila correctamente sin errores
          npm run build -- --configuration development
