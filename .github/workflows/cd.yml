name: Continuous Deployment (OKR 2)

on:
  workflow_run:
    workflows: ["Quality Gate POC"] 
    types:
      - completed
    branches:
      - develop 

jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github 
          settings-path: ${{ github.workspace }} 

      - name: Publish Binary to GitHub Packages
        run: |
          cd resource-server
          # 3. SETTINGS FLAG: Forzamos a Maven a usar el archivo de configuración generado arriba
          mvn deploy -DskipTests --settings ../settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

      - name: Deploy to Staging (Simulated)
        run: |
          echo "Desplegando Resource Server en entorno de pruebas..."
          echo "Estado del sistema: [OK]"
        env:
          DB_URL: ${{ secrets.DB_URL }}

      - name: ZAP Scan (DAST)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'https://www.google.com' # En una prod real sería tu URL de Staging
          rules_file_name: '.zap/rules.tsv'
          fail_action: false # Para que no bloquee la POC si encuentra alertas leves

  deploy-frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          cd ag-prueba-front
          npm ci
          npm run build -- --configuration production

      - name: Upload to Static Hosting (Simulated)
        run: echo "Subiendo build de Angular a servidor de estáticos..."
