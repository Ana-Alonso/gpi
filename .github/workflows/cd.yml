name: Continuous Deployment (OKR 2)

on:
  workflow_run:
    workflows: ["Quality Gate POC"] # Se dispara al terminar el workflow de la Entrega 1
    types:
      - completed
    branches:
      - develop

jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Production Artifact
        run: |
          cd resource-server
          mvn clean package -DskipTests
      - name: Publish Binary to GitHub Packages
        run: |
          cd resource-server
          mvn deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      - name: Deploy to Staging (Simulated)
        run: |
          echo "Desplegando Resource Server en entorno de pruebas..."
          # Aquí irían comandos reales como: 
          # gcloud app deploy o docker push
          echo "Estado del sistema: [OK]"
        env:
          DB_URL: ${{ secrets.DB_URL }} # Fuente única de verdad

  deploy-frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          cd ag-prueba-front
          npm ci
          npm run build -- --configuration production

      - name: Upload to Static Hosting (Simulated)
        run: echo "Subiendo build de Angular a servidor de estáticos..."
